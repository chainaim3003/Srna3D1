# ============================================================
# HY-BAS-ADV1 — Configuration
# ============================================================
# ADV1 = BASIC + template features from Approach 1
# Difference from BASIC: pair_dim is 80 (64 pairwise + 16 template)
# ============================================================
# ALL PATHS VERIFIED 2026-03-22
# Template source: Fork 2 (jaejohn, scored 0.287 on Kaggle)
# E-values: Kalai Result.txt (identical search results across all runs)
# ============================================================

# --- Backbone (UNCHANGED from BASIC) ---
backbone:
  source: "official"
  repo_path: "../../../RibonanzaNet"                         # VERIFIED: has Network.py
  weights_path: "../../../ribonanza-weights/RibonanzaNet.pt"  # VERIFIED: 43.3 MB
  ntoken: 5
  ninp: 256
  pairwise_dimension: 64
  freeze: true

# --- Template Encoder (NEW in ADV1) ---
template:
  template_dim: 16
  num_bins: 22
  max_dist: 40.0

  # Fork 2 (jaejohn) templates — scored 0.287 TM on Kaggle
  # Better than Kalai (~0.15-0.20) due to jaejohn's superior
  # template ranking, gap-filling, and diversity strategies
  local_submission_csv: "../../APPROACH1-TEMPLATE/fork2-JJ/REMOTE/run1/submission-fork2.csv"

  # E-values from Kalai's Result.txt — identical to all other runs
  # (same MMseqs2 search, same database, same parameters)
  local_result_txt: "../../APPROACH1-TEMPLATE/mine/kalai/run1/Result_20260321_1100_UTC_kalai.txt.txt"

  kaggle_template_dir: "/kaggle/working/templates"

# --- Distance Head (MODIFIED: pair_dim 64 -> 80) ---
distance_head:
  pair_dim: 80
  hidden_dim: 128
  num_layers: 3
  dropout: 0.1

# --- 3D Reconstruction (UNCHANGED from BASIC) ---
reconstruction:
  method: "mds_then_refine"
  refine_steps: 100
  refine_lr: 0.01
  target_consecutive_dist: 5.9

# --- Data ---
data:
  train_pickle_path: "../../../stanford3d-pickle/pdb_xyz_data.pkl"  # VERIFIED: 52.3 MB
  cif_dir: null
  test_csv_path: "../../APPROACH1-TEMPLATE/test_sequences (1).csv"  # VERIFIED
  max_seq_len: 256
  val_fraction: 0.1

# --- Training ---
# NOTE: Training uses SELF-TEMPLATES (true coords of each training example),
# NOT the submission CSV. The template CSV is only used during inference.
# So training quality is independent of which submission CSV is configured.
training:
  epochs: 30
  batch_size: 4
  learning_rate: 0.00005
  weight_decay: 0.01
  gradient_clip: 1.0
  use_fp16: true
  num_workers: 2
  seed: 42
  loss_weights:
    distance_mse: 1.0
    bond_constraint: 0.1
    clash_penalty: 0.05
  save_dir: "./checkpoints"
  save_every: 5

# --- Prediction ---
prediction:
  num_predictions: 5
  noise_scale: 0.5
  refine_steps_range: [50, 75, 100, 125, 150]

# --- Warm Start ---
warm_start:
  basic_checkpoint: "../BASIC/checkpoints/best_model.pt"  # VERIFIED: 312 KB
  strategy: "expand_first_layer"
