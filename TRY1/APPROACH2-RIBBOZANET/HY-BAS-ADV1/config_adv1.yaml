# ============================================================
# HY-BAS-ADV1 — Configuration
# ============================================================
# ADV1 = BASIC + template features from Approach 1
# Difference from BASIC: pair_dim is 80 (64 pairwise + 16 template)
# ============================================================
# PATH REFERENCE (from HY-BAS-ADV1 directory):
#   ../           = APPROACH2-RIBBOZANET/
#   ../../        = TRY1/
#   ../../../     = Srna3D1/
#   ../../../..   = STANFORD-RNA/
# Same depth as BASIC — all BASIC relative paths work here too.
# ============================================================
# STATUS: Paths verified 2026-03-22
#   backbone.repo_path:         NOT FOUND — needs: git clone RibonanzaNet
#   backbone.weights_path:      NOT FOUND — needs: download from Kaggle
#   data.train_pickle_path:     NOT FOUND — needs: verify location
#   data.test_csv_path:         VERIFIED OK
#   template.local_result_txt:  VERIFIED OK
#   template.local_submission:  VERIFIED OK (filename corrected)
#   warm_start.basic_checkpoint: VERIFIED OK
# ============================================================

# --- Backbone (UNCHANGED from BASIC) ---
backbone:
  source: "official"

  # NEEDS: git clone https://github.com/Shujun-He/RibonanzaNet
  # into Srna3D1/RibonanzaNet/
  # OR update this path to wherever the repo actually is
  repo_path: "../../../RibonanzaNet"

  # NEEDS: Download RibonanzaNet.pt from
  # https://www.kaggle.com/datasets/shujun717/ribonanzanet-weights
  # into Srna3D1/ribonanza-weights/
  # OR update this path to wherever the weights actually are
  weights_path: "../../../ribonanza-weights/RibonanzaNet.pt"

  ntoken: 5
  ninp: 256
  pairwise_dimension: 64
  freeze: true

# --- Template Encoder (NEW in ADV1) ---
template:
  template_dim: 16
  num_bins: 22
  max_dist: 40.0

  # VERIFIED: These files exist
  local_submission_csv: "../../APPROACH1-TEMPLATE/mine/kalai/run1/submission_20260321_1100_UTC_kalai.csv.csv"
  local_result_txt: "../../APPROACH1-TEMPLATE/mine/kalai/run1/Result_20260321_1100_UTC_kalai.txt.txt"

  kaggle_template_dir: "/kaggle/working/templates"

# --- Distance Head (MODIFIED: pair_dim 64 -> 80) ---
distance_head:
  pair_dim: 80
  hidden_dim: 128
  num_layers: 3
  dropout: 0.1

# --- 3D Reconstruction (UNCHANGED from BASIC) ---
reconstruction:
  method: "mds_then_refine"
  refine_steps: 100
  refine_lr: 0.01
  target_consecutive_dist: 5.9

# --- Data ---
data:
  # NEEDS: Verify this pickle file exists at Srna3D1/stanford3d-pickle/
  # If not, check if it was generated during BASIC training
  train_pickle_path: "../../../stanford3d-pickle/pdb_xyz_data.pkl"
  cif_dir: null

  # VERIFIED: This file exists
  test_csv_path: "../../APPROACH1-TEMPLATE/test_sequences (1).csv"
  max_seq_len: 256
  val_fraction: 0.1

# --- Training ---
training:
  epochs: 30
  batch_size: 4
  learning_rate: 0.00005
  weight_decay: 0.01
  gradient_clip: 1.0
  use_fp16: true
  num_workers: 2
  seed: 42
  loss_weights:
    distance_mse: 1.0
    bond_constraint: 0.1
    clash_penalty: 0.05
  save_dir: "./checkpoints"
  save_every: 5

# --- Prediction ---
prediction:
  num_predictions: 5
  noise_scale: 0.5
  refine_steps_range: [50, 75, 100, 125, 150]

# --- Warm Start ---
warm_start:
  # VERIFIED: This file exists (312KB)
  basic_checkpoint: "../BASIC/checkpoints/best_model.pt"
  strategy: "expand_first_layer"
