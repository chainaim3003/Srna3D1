# ============================================================
# Approach 2 BASIC — Configuration
# ============================================================
# All hyperparameters in one place. No magic numbers in code.
# ============================================================
# PATHS UPDATED: 2026-03-20 based on actual filesystem layout
# ============================================================

# --- Backbone ---
backbone:
  # "official" = use cloned Shujun-He/RibonanzaNet repo
  # "multimolecule" = use pip install multimolecule
  source: "official"

  # Path to the cloned RibonanzaNet repo
  # Actual location: Srna3D1/RibonanzaNet/
  repo_path: "../../../RibonanzaNet"

  # Path to pretrained weights file
  # Actual file: Srna3D1/ribonanza-weights/RibonanzaNet.pt
  # Other files in that folder (RibonanzaNet-Deg.pt, -Drop.pt, -SS.pt)
  # are fine-tuned variants for other tasks — we use the BASE model.
  weights_path: "../../../ribonanza-weights/RibonanzaNet.pt"

  # These must match the pretrained model's config
  # From official RibonanzaNet configs/pairwise.yaml:
  ntoken: 5             # A=0, C=1, G=2, U=3, pad=4
  ninp: 256             # Embedding / hidden dimension
  pairwise_dimension: 64  # Pairwise feature dimension

  freeze: true          # Freeze backbone during training

# --- Distance Head ---
distance_head:
  # Input: pairwise representation (B, N, N, pairwise_dim)
  hidden_dim: 128
  num_layers: 3         # Number of linear layers in the MLP
  dropout: 0.1

# --- 3D Reconstruction ---
reconstruction:
  method: "mds_then_refine"   # "mds_only" or "mds_then_refine"
  refine_steps: 100           # Gradient descent steps after MDS
  refine_lr: 0.01             # Learning rate for refinement
  target_consecutive_dist: 5.9  # Typical C1'-C1' distance in Angstroms

# --- Data ---
data:
  # Actual file: Srna3D1/stanford3d-pickle/pdb_xyz_data.pkl
  train_pickle_path: "../../../stanford3d-pickle/pdb_xyz_data.pkl"

  # OR: path to directory with CIF files (not needed if pickle works)
  cif_dir: null

  # Competition test sequences
  # Actual file: Srna3D1/TRY1/APPROACH1-TEMPLATE/test_sequences (1).csv
  test_csv_path: "../../APPROACH1-TEMPLATE/test_sequences (1).csv"

  max_seq_len: 256          # Cap sequence length (pairwise repr is N^2)
  val_fraction: 0.1         # Fraction of training data for validation

# --- Training ---
training:
  epochs: 35
  batch_size: 4             # Small due to N^2 memory for pairwise
  learning_rate: 0.0001     # 1e-4
  weight_decay: 0.01
  gradient_clip: 1.0
  use_fp16: true            # Mixed precision
  num_workers: 2
  seed: 42

  # Loss weights
  loss_weights:
    distance_mse: 1.0       # Primary: MSE on predicted vs true distances
    bond_constraint: 0.1    # Consecutive C1' distance ~5.9 Angstroms
    clash_penalty: 0.05     # Penalize non-bonded atoms < 3.0 Angstroms apart

  # Checkpointing
  save_dir: "./checkpoints"
  save_every: 10            # Save every N epochs

# --- Prediction ---
prediction:
  num_predictions: 5        # Competition requires 5 predictions per target
  noise_scale: 0.5          # Noise added to distances for diversity (Angstroms)
  refine_steps_range: [50, 75, 100, 125, 150]
